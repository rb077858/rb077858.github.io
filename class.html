<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנטור שקט כיתתי - הגדרות אישיות</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #controls {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 1;
            width: 350px;
        }

        .settings-group {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .meter-container {
            position: relative;
            width: 100%;
            height: 40px;
            background: #e0e0e0;
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
        }

        #meter-fill {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: width 0.05s linear;
        }

        #threshold-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ff0000;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            z-index: 2;
        }

        #shush-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #shush-overlay span {
            font-size: 25rem;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        button {
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            transition: background 0.2s;
        }

        button:disabled {
            background-color: #ccc;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="controls">
        <h1>מנטור שקט</h1>
        
        <button id="start-btn">הפעל מיקרופון</button>

        <div class="settings-group">
            <label for="threshold-slider">הגדר סף רעש להפעלה: <b id="threshold-val">30</b>%</label>
            <input type="range" id="threshold-slider" min="5" max="95" value="30">
        </div>

        <div class="meter-container">
            <div id="threshold-line" style="right: 30%;"></div>
            <div id="meter-fill"></div>
        </div>
        
        <p>עוצמה נוכחית: <span id="current-vol">0</span>%</p>
    </div>

    <div id="shush-overlay">
        <span>🤫</span>
        <h2 style="color: white; font-size: 3rem;">נא לשמור על השקט!</h2>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdValDisp = document.getElementById('threshold-val');
        const thresholdLine = document.getElementById('threshold-line');
        const meterFill = document.getElementById('meter-fill');
        const currentVolDisp = document.getElementById('current-vol');
        const shushOverlay = document.getElementById('shush-overlay');

        let threshold = 30;
        let audioContext;
        let analyser;
        let dataArray;

        // עדכון סף הרעש בזמן אמת
        thresholdSlider.addEventListener('input', (e) => {
            threshold = parseInt(e.target.value);
            thresholdValDisp.textContent = threshold;
            // הזזת הקו האדום במד (מימין לשמאל בגלל RTL)
            thresholdLine.style.right = threshold + '%';
        });

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                initAudio(stream);
                startBtn.disabled = true;
                startBtn.textContent = "מערכת פעילה";
            } catch (err) {
                alert("שגיאה בגישה למיקרופון. וודא שנתת הרשאות.");
            }
        });

        function initAudio(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(stream);
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            source.connect(analyser);
            monitor();
        }

        function monitor() {
            analyser.getByteFrequencyData(dataArray);
            
            // חישוב עוצמה ממוצעת
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let average = sum / dataArray.length;
            
            // המרה לאחוזים (נרמול גס של רגישות)
            let volumePercent = Math.round((average / 128) * 100);
            
            updateUI(volumePercent);
            requestAnimationFrame(monitor);
        }

        function updateUI(vol) {
            const cappedVol = Math.min(vol, 100);
            meterFill.style.width = cappedVol + '%';
            currentVolDisp.textContent = cappedVol;

            // בדיקה האם עברנו את הסף
            if (cappedVol >= threshold) {
                shushOverlay.style.display = 'flex';
                meterFill.style.backgroundColor = '#ff4444';
            } else {
                shushOverlay.style.display = 'none';
                meterFill.style.backgroundColor = '#4caf50';
            }
        }
    </script>
</body>
</html>
