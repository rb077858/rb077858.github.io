<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>הצטרפות לתוכנית — מתכנן הקולנוע</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #fdf1ea;
    color: #2b1a12;
    padding: 24px;
    box-sizing: border-box;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1410; color: #f5e9dd; }
    .card { background: #2a1f18; }
    .code { background: #3a2c22; color: #ffd9b0; }
  }
  .card {
    max-width: 420px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  }
  h1 { font-size: 1.4rem; margin: 0 0 8px; }
  p { line-height: 1.6; margin: 8px 0; }
  .code {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    background: #f3e3d8;
    color: #7a3b1e;
    border-radius: 14px;
    padding: 16px;
    margin: 20px 0;
    direction: ltr;
  }
  .hint { font-size: 0.9rem; opacity: 0.75; margin-top: 24px; }
  button {
    font: inherit;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 999px;
    border: none;
    background: #b3261e;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🎬 הוזמנתם לתוכנית בקולנוע!</h1>
    <p>פתחו את אפליקציית <strong>מתכנן הקולנוע</strong> והזינו את הקוד הבא כדי להצטרף ולראות מי עוד מגיע:</p>
    <div class="code" id="code">------</div>
    <button onclick="copyCode()">העתקת הקוד</button>
    <p class="hint">אם האפליקציה מותקנת אצלכם, הקישור הזה היה אמור לפתוח אותה ישירות. אם לא — התקינו אותה והזינו את הקוד ידנית במסך "הצטרפות לתוכנית עם קוד".</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '';
    document.getElementById('code').textContent = code || '—';

    function copyCode() {
      if (!code) return;
      navigator.clipboard?.writeText(code);
    }

    // If the OS didn't intercept this as a verified App Link (app installed but not yet
    // re-verified, e.g. right after a fresh install), try the legacy custom-scheme link too.
    if (code) {
      window.location.href = 'cinemaplanner://plan/' + encodeURIComponent(code);
    }
  </script>
</body>
</html>
