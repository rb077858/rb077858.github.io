<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PashPod - האזנה ופרקים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --spotify-color: #1DB954;
            --pocketcasts-color: #f43e37;
            --podcastaddict-color: #f48424;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Assistant', sans-serif;
            background: url('image.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 { font-size: 2.8rem; margin-bottom: 5px; color: #1e272e; }
        .subtitle { margin-bottom: 25px; color: #485460; font-weight: bold; font-size: 1.1rem; }

        .apps-grid {
            display: grid;
            gap: 12px;
            margin-bottom: 35px;
        }

        .app-link {
            display: flex;
            align-items: center;
            padding: 14px 25px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .app-link:hover { transform: scale(1.03); }
        .app-link i { margin-left: 15px; font-size: 1.4rem; width: 30px; text-align: center; }

        .spotify { background-color: var(--spotify-color); }
        .pocketcasts { background-color: var(--pocketcasts-color); }
        .podcastaddict { background-color: var(--podcastaddict-color); }

        .online-player {
            border-top: 2px solid #ddd;
            padding-top: 25px;
            text-align: right;
        }

        .player-title {
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 18px;
            color: #2d3436;
            font-weight: 700;
        }

        #episode-list {
            max-height: 320px;
            overflow-y: auto;
            margin-bottom: 20px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: white;
            text-align: right;
        }

        .episode-item {
            padding: 12px 18px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
            color: #2d3436;
            display: flex;
            justify-content: space-between;
        }

        .episode-item:hover { background-color: #f1f2f6; }
        .episode-item.active { background-color: #e8f4fd; border-right: 5px solid #3498db; font-weight: 700; }

        .episode-num { color: #95a5a6; font-size: 0.8rem; margin-right: 10px; }

        audio { width: 100%; margin-top: 15px; border-radius: 8px; }

        #episode-list::-webkit-scrollbar { width: 8px; }
        #episode-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PashPod</h1>
        <p class="subtitle">פרשת השבוע בגובה העיניים</p>

        <div class="apps-grid">
            <a href="https://open.spotify.com/show/4emmIesm6wIUK9gl6NgEY0?si=ZFpx7q80QKWL244rPdwN7A" class="app-link spotify" target="_blank">
                <i class="fab fa-spotify"></i> <span>Spotify</span>
            </a>
            <a href="https://pca.st/podcast/f42817a0-021f-013f-2afb-0e956d54cc61" class="app-link pocketcasts" target="_blank">
                <i class="fa-solid fa-radio"></i> <span>Pocket Casts</span>
            </a>
            <a href="https://podcastaddict.com/podcast/pashpod/6851701" class="app-link podcastaddict" target="_blank">
                <i class="fa-solid fa-rss"></i> <span>Podcast Addict</span>
            </a>
        </div>

        <div class="online-player">
            <div class="player-title"><i class="fa-solid fa-headphones"></i> שמיעה אונליין</div>
            <div id="episode-list">טוען פרקים...</div>
            <audio id="audio-player" controls></audio>
        </div>
    </div>

    <script>
        const rssUrl = "https://anchor.fm/s/10e3b44f8/podcast/rss";
        const proxyUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rssUrl);

        async function loadEpisodes() {
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const listContainer = document.getElementById('episode-list');
                const audioPlayer = document.getElementById('audio-player');
                
                if (data.status === 'ok') {
                    listContainer.innerHTML = '';
                    
                    // הפיכת סדר הפרקים כך שהראשון שהוקלט יהיה אינדקס 0
                    const episodes = data.items.reverse();

                    const urlParams = new URLSearchParams(window.location.search);
                    const targetEpisodeNum = parseInt(urlParams.get('episode'));

                    episodes.forEach((item, index) => {
                        const episodeDisplayNum = index + 1;
                        const div = document.createElement('div');
                        div.className = 'episode-item';
                        div.innerHTML = `<span>${item.title}</span><span class="episode-num">#${episodeDisplayNum}</span>`;
                        
                        const playFunc = () => {
                            document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active'));
                            div.classList.add('active');
                            audioPlayer.src = item.enclosure.link;
                            audioPlayer.play();
                        };

                        div.onclick = playFunc;
                        listContainer.appendChild(div);

                        // אם המספר ב-URL תואם למספר הפרק ההיסטורי
                        if (episodeDisplayNum === targetEpisodeNum) {
                            playFunc();
                            setTimeout(() => {
                                div.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }, 500);
                        }
                    });
                }
            } catch (e) {
                document.getElementById('episode-list').innerText = 'שגיאה בטעינה.';
            }
        }

        loadEpisodes();
    </script>
</body>
</html>
